{% extends 'base.html' %}

{% block title %}发布失物 - 校园失物招领平台{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">📝 发布失物信息</h2>
        </div>
        
        <form method="POST" action="{{ url_for('items.post') }}" enctype="multipart/form-data">
            <div class="form-group">
                <label class="form-label">物品名称 *</label>
                <input type="text" name="item_name" class="form-control" placeholder="请输入物品名称" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">物品类型 *</label>
                <select name="item_type" class="form-control" required>
                    <option value="">请选择物品类型</option>
                    <option value="电子产品">电子产品</option>
                    <option value="证件卡类">证件卡类</option>
                    <option value="衣物配饰">衣物配饰</option>
                    <option value="学习用品">学习用品</option>
                    <option value="生活用品">生活用品</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            
            <div class="separator"></div>
            
            <div class="form-group">
                <label class="form-label">详细描述</label>
                <textarea name="description" class="form-control" placeholder="请详细描述物品特征，方便他人识别"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">发现/丢失地点 *</label>
                <input type="text" name="location" class="form-control" placeholder="请输入具体地点" required>
            </div>
            
            <div class="separator"></div>
            
            <div class="form-group">
                <label class="form-label">上传图片</label>
                <input type="file" name="image" class="form-control" accept="image/*">
                <p style="font-size: 12px; color: #999999; margin-top: 5px;">支持 PNG、JPG、GIF 格式，最大 16MB</p>
            </div>
            
            <div class="separator"></div>
            
            <div class="form-group">
                <label class="form-label">联系人</label>
                <input type="text" name="contact_name" class="form-control" placeholder="默认使用您的昵称" value="{{ user.nickname or user.username }}">
            </div>
            
            <div class="form-group">
                <label class="form-label">联系电话</label>
                <input type="tel" name="contact_phone" class="form-control" placeholder="请输入手机号" value="{{ user.phone or '' }}">
            </div>
            
            <div class="separator"></div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                发布信息
            </button>
        </form>
    </div>
</div>
{% endblock %}
