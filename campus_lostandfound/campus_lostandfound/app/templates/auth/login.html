{% extends 'base.html' %}

{% block title %}登录 - 校园失物招领平台{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            <h2 class="card-title" style="font-size: 24px; text-align: center; width: 100%;">
                👋 欢迎回来
            </h2>
        </div>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label">用户名 *</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码 *</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            
            <div class="separator"></div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                登录
            </button>
            
            <p style="text-align: center; margin-top: 15px; color: #999999;">
                还没有账号？<a href="{{ url_for('auth.register') }}" style="color: #E8792B;">立即注册</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
