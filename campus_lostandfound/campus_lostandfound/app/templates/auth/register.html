{% extends 'base.html' %}

{% block title %}注册 - 校园失物招领平台{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            <h2 class="card-title" style="font-size: 24px; text-align: center; width: 100%;">
                🎓 用户注册
            </h2>
        </div>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label class="form-label">用户名 *</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码 *</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码（至少6位）" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">确认密码 *</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="请再次输入密码" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">邮箱 *</label>
                <input type="email" name="email" class="form-control" placeholder="请输入邮箱" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" name="phone" class="form-control" placeholder="请输入手机号">
            </div>
            
            <div class="form-group">
                <label class="form-label">昵称</label>
                <input type="text" name="nickname" class="form-control" placeholder="请输入昵称">
            </div>
            
            <div class="form-group">
                <label class="form-label">身份选择</label>
                <div style="display: flex; gap: 20px;">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="radio" name="role" value="loser" checked>
                        <span>我是丢失者</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="radio" name="role" value="finder">
                        <span>我是捡拾者</span>
                    </label>
                </div>
            </div>
            
            <div class="separator"></div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                注册
            </button>
            
            <p style="text-align: center; margin-top: 15px; color: #999999;">
                已有账号？<a href="{{ url_for('auth.login') }}" style="color: #E8792B;">立即登录</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
